name: Build, Test and Deploy GenAI App

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build Docker Image
        # Using 'genai-repo' to match your verified Artifact Registry
        run: |
          docker build -t asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/genai-repo/genai-app:${{ github.sha }} \
                       -t asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/genai-repo/genai-app:latest .

      - name: Test Docker Image
        # Health check: Ensures the app boots before we attempt to deploy it
        run: |
          docker run --rm -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/genai-repo/genai-app:${{ github.sha }} \
            python -c "import genai_app; print('App module loaded successfully')"

      - name: Push Docker Image to Artifact Registry
        # These steps were missing in your previous run
        run: |
          docker push asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/genai-repo/genai-app:${{ github.sha }}
          docker push asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/genai-repo/genai-app:latest

      - name: Deploy to Cloud Run
        # This creates the live service in your Google Cloud console
        run: |
          gcloud run deploy genai-app \
            --image asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/genai-repo/genai-app:${{ github.sha }} \
            --platform managed \
            --region asia-south1 \
            --allow-unauthenticated \
            --port 8000 \
            --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Set up Git for Hugging Face
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "GitHub Actions Bot"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://huggingface.co/spaces/CNProgram-team/genai-app || true
          git push https://user:${HF_TOKEN}@huggingface.co/spaces/CNProgram-team/genai-app main --force